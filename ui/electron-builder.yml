# electron-builder 패키징 설정
# 기준 디렉토리: 이 파일이 있는 ui/ (package.json 위치)
appId: com.litbig.canalyst-controller
productName: CANalyst-II Controller

directories:
  # 패키징 산출물(설치본/portable)이 떨어지는 위치
  output: dist

# 앱에 동봉할 파일: electron-vite 산출물(out/) + 런타임 메타데이터
# build/icon.png 은 패키지(asar) 안에 동봉해야 BrowserWindow 의
# icon: join(__dirname,'../../build/icon.png') 가 패키지 모드에서도 해석된다.
files:
  - out/**/*
  - package.json
  - build/icon.png

# 추가 리소스: PyInstaller 가 생성할 코어 바이너리를 앱 resources/core/ 로 동봉.
# from 은 ui/ 기준 상대경로(=canalyst-controller/core/dist), to 는 resources 하위 경로.
# extraResources 는 항상 asar 바깥(resources/)에 위치하므로 사이드카 spawn 이 가능하다.
# 주의: core/dist 는 PyInstaller 빌드 후 생성됨(아직 없음 — 설정만).
#       이 매핑은 PyInstaller --onefile(dist 루트에 canalyst-core[.exe] 직접 생성) 가정.
#       --onedir 모드면 dist/canalyst-core/ 트리째 복사되어 경로 규약이 달라진다.
extraResources:
  - from: ../core/dist
    to: core

# Windows: NSIS 설치본만 생성(배포는 설치 프로그램으로 단일화).
# icon 은 build/icon.png(512px) 를 명시. NSIS 용 .ico 는 electron-builder 가 PNG 에서 자동 생성한다.
win:
  icon: build/icon.png
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# macOS: dmg (호스트가 mac 일 때만 빌드됨)
# icon 은 build/icon.png 를 명시. .icns 는 electron-builder 가 PNG 에서 자동 생성한다.
#
# 코드서명: electron-builder 가 앱 번들을 반드시 (재)서명하게 해야 한다. 서명을 건너뛰면
#   Electron 프리빌트의 linker ad-hoc 서명이 그대로 남는데, 패키징이 번들을 수정
#   (실행파일 리네임·리소스/Info.plist 추가)하므로 그 서명이 번들과 불일치(무효 봉인)된다.
#   → 다운로드(quarantine)된 앱을 macOS 가 "손상되어 열 수 없음" 으로 차단해 설치 불가.
#   서명 identity 는 CI(release.yml)에서 주입한다: 인증서가 없으면 ad-hoc('-')으로
#   유효 서명만 생성(공증은 아님 → 사용자 1회 Gatekeeper 우회 필요, README 참고).
# hardenedRuntime + entitlements: ad-hoc/정식 서명 모두에서 V8 JIT·동봉 코어 로드가
#   라이브러리 검증에 막히지 않도록 build/entitlements.mac.plist 의 예외를 적용한다.
#   (정식 Developer ID 공증 경로로 확장할 때도 hardenedRuntime 은 필수 전제다.)
mac:
  icon: build/icon.png
  target:
    - dmg
  category: public.app-category.developer-tools
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# Linux: AppImage (호스트가 linux 일 때만 빌드됨)
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
