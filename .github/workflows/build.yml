name: build

# PR 머지 게이트: 테스트 + 빌드 검증만 수행한다.
# (인스톨러/PyInstaller 패키징은 하지 않음 — 릴리즈 워크플로우에서 별도 처리)
on:
  pull_request:
    branches: [main]

# 같은 PR/브랜치에서 새 푸시가 오면 진행 중인 이전 실행을 취소해 러너 시간 절약
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Python core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/pyproject.toml

      - name: 의존성 설치
        working-directory: core
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        working-directory: core
        run: pytest -q

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: 의존성 설치
        working-directory: ui
        # vitest(jsdom)와 electron-vite build는 Electron 런타임 바이너리가 필요 없으므로
        # ~120MB 다운로드를 생략해 CI 시간을 줄인다.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      - name: 테스트 (vitest)
        working-directory: ui
        run: npm test

      - name: 빌드 검증 (electron-vite build)
        working-directory: ui
        run: npm run build
