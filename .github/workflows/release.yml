name: release

# "v2026.06.23"(vYYYY.MM.DD) 날짜식 태그가 푸시되면 트리거된다.
# 주의: 아래 tags 필터는 정규식이 아니라 glob 패턴이다.
#   - '.' 은 리터럴 점, '[0-9]' 는 숫자 1자리 → 4-2-2 자리 날짜를 정확히 매칭
on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]"        # 정식 릴리즈: v2026.06.23
      - "v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*"      # 프리릴리즈: v2026.06.23-rc.1

# 릴리즈 생성 및 에셋 업로드에 쓰기 권한이 필요하다.
permissions:
  contents: write

jobs:
  # ── OS별 설치본 빌드 (매트릭스) ──────────────────────────────────────────
  # Windows/macOS/Linux 각 러너에서 코어(PyInstaller) + UI(electron-builder)를
  # 그 OS용 설치본으로 빌드해 워크플로우 아티팩트로 올린다. 실제 GitHub Release
  # 발행·첨부는 아래 release 잡이 셋을 모아 한 번에 수행한다.
  #   - core_bin        : PyInstaller --onefile 산출물 이름(Windows 만 .exe)
  #   - eb_platform     : electron-builder 플랫폼 플래그(타겟은 electron-builder.yml 참조)
  #   - installer_glob  : 그 OS 설치본 파일 glob (nsis=.exe / dmg / AppImage)
  #   - asset           : 아티팩트 이름 구분용 OS 키
  build:
    name: 빌드 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # 한 OS 가 실패해도 나머지 OS 빌드는 끝까지 돌려 원인 파악을 쉽게 한다.
      # (단 release 잡은 needs: build 라 하나라도 실패하면 발행되지 않는다 — 의도적.)
      fail-fast: false
      matrix:
        # 설치본 파일명은 CI 에서 electron-builder 의 -c.<타깃>.artifactName 으로
        # 통일한다(로컬 npm run dist 는 건드리지 않음). 최종형:
        #   CANalyst-II-Controller-<표시버전>-<플랫폼>-<아치>.<확장자>
        #   예) ...-2026.06.23-rc.2-win-x64.exe / -mac-arm64.dmg / -linux-x86_64.AppImage
        #   - art_target : artifactName 을 덮어쓸 electron-builder 타깃 키
        #   - art_tail   : 버전 뒤에 붙는 <플랫폼>-<아치>.<확장자> 조각.
        #       · Windows 는 NSIS 의 ${arch} 가 빈 문자열로 나오는 버그가 있어 x64 를
        #         하드코딩하고 확장자도 리터럴(exe)로 둔다.
        #       · mac/linux 는 ${arch}·${ext} 를 electron-builder 매크로로 두어
        #         arm64/dmg, x86_64/AppImage 로 자동 치환되게 한다(향후 멀티아치 대응).
        include:
          - os: windows-latest
            core_bin: canctl-core.exe
            eb_platform: "--win"
            installer_glob: "ui/dist/*.exe"
            asset: win
            art_target: nsis
            art_tail: "win-x64.exe"
          # macos-latest 는 현재 arm64(Apple Silicon) 러너 → 산출물은 arm64 전용 dmg.
          # Intel Mac 용은 별도 빌드가 필요(코어 PyInstaller 도 universal 이어야 함) — 범위 밖.
          - os: macos-latest
            core_bin: canctl-core
            eb_platform: "--mac"
            installer_glob: "ui/dist/*.dmg"
            asset: mac
            art_target: dmg
            art_tail: "mac-${arch}.${ext}"
          - os: ubuntu-latest
            core_bin: canctl-core
            eb_platform: "--linux"
            installer_glob: "ui/dist/*.AppImage"
            asset: linux
            art_target: appImage
            art_tail: "linux-${arch}.${ext}"

    # 모든 OS 에서 동일하게 동작하도록 run 셸을 bash 로 고정한다.
    #   - Windows: Git Bash. '-c.x=y' 같은 인자를 pwsh 가 쪼개 도구가 오해하는 일 회피.
    #   - macOS/Linux: 시스템 bash.
    defaults:
      run:
        shell: bash

    steps:
      - name: 체크아웃 (태그·전체 이력 포함)
        uses: actions/checkout@v4
        with:
          # annotated 태그 메시지·전체 커밋 이력을 받기 위해 얕은 클론 해제
          fetch-depth: 0

      # 태그에서 버전을 도출한다.
      #   version : 접두사 v 제거한 표시용 버전(2026.06.23) — 릴리즈 제목 등에 사용
      #   semver  : electron-builder 가 요구하는 유효 semver. 날짜의 선행 0(06,23)은
      #             semver 규칙상 허용되지 않으므로 각 세그먼트의 선행 0을 제거한다
      #             (2026.06.23 → 2026.6.23, 프리릴리즈 -rc.1 은 그대로 보존).
      - name: 버전 도출
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE="${VERSION%%-*}"                  # 2026.06.23
          PRE=""
          [ "$VERSION" != "$BASE" ] && PRE="-${VERSION#*-}"   # -rc.1
          IFS='.' read -r Y M D <<< "$BASE"
          # 10# 접두사로 10진 해석 → 선행 0 제거(08/09 8진수 오류도 회피)
          SEMVER="$((10#$Y)).$((10#$M)).$((10#$D))${PRE}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER"   >> "$GITHUB_OUTPUT"
          echo "태그=$TAG / 표시버전=$VERSION / semver=$SEMVER"

      # ── Python 코어 → PyInstaller 단일 실행파일 ─────────────────────────
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/pyproject.toml

      - name: 코어 의존성 + PyInstaller 설치
        working-directory: core
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      # 코어 __version__ 을 태그 버전(표시용 2026.06.23)으로 주입한다.
      #   로컬 소스는 0.0.0 placeholder 이고, 태그를 단일 버전 출처로 삼는다.
      #   sed -i 는 macOS(BSD sed)에서 인자 규약이 달라 깨지므로, 세 OS 모두에
      #   존재가 보장되는 python(위에서 setup 됨)으로 in-place 치환한다.
      #   read_text/write_text 에 encoding="utf-8" 을 명시한다 — Windows 의 Python
      #   기본 인코딩은 cp1252 라, 한글 주석이 든 이 파일을 그냥 읽으면
      #   UnicodeDecodeError(byte 0x81)로 죽는다(macOS/Linux 는 기본 UTF-8 라 통과).
      - name: 코어 버전 주입
        working-directory: core
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("canctl_core/__init__.py")
          ver = os.environ["NEW_VERSION"]
          text = re.sub(r'^__version__ = .*', f'__version__ = "{ver}"', p.read_text(encoding="utf-8"), flags=re.M)
          p.write_text(text, encoding="utf-8")
          print(next(l for l in text.splitlines() if l.startswith("__version__")))
          PY

      # core/canctl-core.spec 은 .gitignore 의 `*.spec` 대상이라 CI 에 없다.
      # 따라서 spec 의 collect_all/collect_submodules 와 동일한 동작을 CLI
      # 플래그로 재현한다. (spec 을 고치면 이 플래그도 함께 맞출 것)
      # 산출물: core/dist/canctl-core[.exe] (--onefile, OS별 확장자 차이)
      - name: 코어 패키징 (PyInstaller)
        working-directory: core
        run: >
          pyinstaller --onefile --console --name canctl-core
          --collect-all canalystii
          --collect-all libusb_package
          --collect-all cantools
          --collect-submodules can
          --collect-submodules canctl_core
          pyinstaller_entry.py

      - name: 코어 산출물 확인
        run: test -f "core/dist/${{ matrix.core_bin }}"

      # ── Electron UI → OS별 설치본 ──────────────────────────────────────
      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # 패키징에는 Electron 런타임 바이너리가 필요하므로 SKIP 하지 않는다.
      # (PR 게이트 build.yml 과 달리 ELECTRON_SKIP_BINARY_DOWNLOAD 미설정)
      - name: UI 의존성 설치
        working-directory: ui
        run: npm ci

      - name: UI 빌드 (electron-vite)
        working-directory: ui
        run: npm run build

      # 패키징 직전에 package.json 버전을 태그 버전(semver)으로 덮어쓴다.
      #   날짜 태그의 선행 0 때문에 표시버전(2026.06.23)이 아닌 semver(2026.6.23)를 쓴다.
      #   CLI 의 '-c.x=y' 표기는 셸/yargs 파싱에 취약하므로, npm pkg set 으로
      #   package.json 에 직접 박아 electron-builder 가 그대로 읽게 한다(보호된 main 미수정).
      # 타겟(nsis/dmg/AppImage)은 electron-builder.yml 의 OS별 target 을 따른다.
      # --publish never: 토큰이 env 에 있고 태그 트리거인 상태에서 electron-builder 가
      #   스스로 릴리즈를 만들려다 아래 release 잡과 충돌하는 것을 막는다.
      # CSC_IDENTITY_AUTO_DISCOVERY=false: macOS 에서 서명 인증서 자동 탐색을 끈다
      #   (CI 에 인증서가 없을 때 서명 시도 실패를 막음). win/linux 에는 무해.
      #
      # 설치본 파일명을 -c.<타깃>.artifactName 으로 통일한다(electron-builder.yml
      # 미수정 → 로컬 npm run dist 의 기본 파일명은 그대로 유지). -c.x=y 는
      # electron-builder.yml 을 그대로 로드한 위에 해당 필드만 덮어쓴다.
      #   CANalyst-II-Controller-<표시버전>-<art_tail>
      #   - 표시버전은 0 패딩된 steps.ver.outputs.version(예: 2026.06.23-rc.2).
      #     semver(${version})는 선행 0 을 못 담으므로 여기서 리터럴로 박는다.
      #   - ART 를 '작은따옴표'로 감싸 bash 가 ${arch}/${ext}(electron 매크로)를
      #     건드리지 못하게 하고, electron-builder 가 이를 arm64·x86_64·dmg 등으로 치환.
      # 주의: 과거 -c.x=y 가 깨졌던 건 pwsh 가 인자를 쪼갰기 때문(#9). 지금은 job
      #   레벨 shell: bash + 따옴표로 단일 argv 가 보장되므로 안전하다. 되돌리지 말 것.
      - name: UI 패키징 (electron-builder)
        working-directory: ui
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm pkg set version="${{ steps.ver.outputs.semver }}"
          ART='CANalyst-II-Controller-${{ steps.ver.outputs.version }}-${{ matrix.art_tail }}'
          echo "artifactName=$ART"
          npx electron-builder ${{ matrix.eb_platform }} --publish never \
            -c.${{ matrix.art_target }}.artifactName="$ART"

      # OS별 설치본을 워크플로우 아티팩트로 업로드(이름은 OS별로 구분 — v4 는 중복 이름 거부).
      # release 잡이 이 아티팩트들을 모두 받아 GitHub Release 에 첨부한다.
      - name: 설치본 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.asset }}
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

  # ── 릴리즈 발행: 세 OS 설치본을 모아 한 번에 GitHub Release 생성·첨부 ───────
  # 별도 잡으로 분리한 이유: 각 OS 잡이 동시에 softprops 로 같은 태그의 릴리즈를
  # 만들면 레이스가 난다. 빌드를 모두 모은 뒤 단일 지점에서 발행해야 안전하다.
  release:
    name: 릴리즈 발행
    needs: build          # 세 OS 빌드가 모두 성공해야 발행(반쪽짜리 릴리즈 방지)
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃 (태그·전체 이력 포함)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 세 OS 잡이 올린 installers-* 아티팩트를 한 디렉토리로 모은다.
      - name: 설치본 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: installers
          merge-multiple: true

      - name: 첨부할 설치본 목록
        run: ls -la installers

      # ── 릴리즈 노트: annotated 태그 메시지에서 추출 ─────────────────────
      - name: 릴리즈 노트 추출
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # checkout 이 annotated 태그 객체를 정확히 가져왔다는 보장이 약하므로 강제 재취득
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}" || true
          : > release_notes.md
          if [ "$(git cat-file -t "$TAG" 2>/dev/null)" = "tag" ]; then
            # %(contents) = annotated 태그 메시지 전체(제목+본문)
            git tag -l --format='%(contents)' "$TAG" > release_notes.md
          fi
          if [ -s release_notes.md ]; then
            echo "fallback=false" >> "$GITHUB_OUTPUT"
            echo "릴리즈 노트를 annotated 태그 메시지에서 추출함."
          else
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            echo "annotated 태그 메시지 없음 → GitHub 자동 생성 노트로 폴백."
          fi

      - name: 릴리즈 생성 + 설치본 첨부 (Win/Mac/Linux)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          # annotated 태그 메시지가 비어 있을 때만 GitHub 자동 노트로 보완
          generate_release_notes: ${{ steps.notes.outputs.fallback == 'true' }}
          # 하이픈 포함 태그(v2026.06.23-rc.1)는 프리릴리즈로 표시
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 첨부할 설치본이 하나도 없으면 실패시켜 깨진 릴리즈를 막는다
          fail_on_unmatched_files: true
          files: |
            installers/**/*
